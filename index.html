<!DOCTYPE html>
<html lang="ru"> 
    <head>
        <meta charset="UTF-8" />
        <title>Учёт финансов</title>  
        <link rel="stylesheet" href="style.css" />   
    </head>  
    <body> 
        <h1>Личный финансовый учёт</h1> 
        <form id="transaction-form">
            <input type="number" id="amount" placeholder="Сумма" required />
            <select id="category" required> 
                <option value="">Категория</option> 
                 <option value="Зарплата">Зарплата</option>  
                 <option value="Еда">Еда</option> 
                 <option value="Транспорт">Транспорт</option>  
            </select> 
            <input type="text" id="description" placeholder="Описание" required />
            <button type="submit">Добавить</button> 
        </form> 
        <h2>Общая сумма: <span id="total">0</span></h2> 
        <table id="transaction-table">
            <thead>
                <tr>
                    <th>Дата</th> 
                    <th>Категория</th> 
                    <th>Описание</th> 
                    <th>Действие</th>  
                </tr> 
            </thead>
            <tbody></tbody>
        </table>
        <div id="details"></div>   
         <script type="module" src="./src/index.js"></script>  
    </body>
</html>
